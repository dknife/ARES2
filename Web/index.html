<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코리아사이언스 화성 탐사선</title>
    <!-- 데스크톱에서 ?mobile=true 로 모바일 화면 미리보기 (head 맨 앞 유지) -->
    <script src="mobile-preview.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <style>
        .container { max-width: 520px; }
        /* 3D 로봇 히어로 무대 */
        #robot-stage {
            width: 100%;
            height: 300px;
            margin: -12px 0 4px;
            position: relative;
        }
        #robot-stage canvas { display: block; cursor: grab; }
        #robot-stage canvas:active { cursor: grabbing; }
        #robot-stage .robot-loading {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85em; color: #bbb;
            transition: opacity 0.4s; pointer-events: none;
        }
        #robot-stage .robot-loading.hidden { opacity: 0; }
        .robot-greet {
            font-size: 0.95em; color: #FA5D29; font-weight: 600;
            margin: 0 0 18px; min-height: 1.2em;
            opacity: 0; transform: translateY(6px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .robot-greet.show { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>
<div class="container">
    <div id="robot-stage">
        <div class="robot-loading" id="robot-loading">알비를 깨우는 중…</div>
    </div>
    <div class="brand">ARES<span class="dot">.</span></div>
    <h1 class="intro-title">화성 탐사선 제어</h1>
    <p class="robot-greet" id="robot-greet">안녕! 나는 탐사로봇 알비야 👋</p>
    <p class="intro-desc">아레스와 알비와 함께 미지의 화성을 탐험하세요!<br>블록을 조합하여 탐사선을 제어하고, 우주의 비밀을 풀어보세요.</p>
    <a href="main.html"><button class="start-btn">탐사선 연결</button></a>
    <a href="../index.html" class="back-link">프로젝트 소개로 돌아가기</a>
</div>

<!-- three.js 로컬 번들 (CDN 없이 동작) → window.THREE, window.ARES3 -->
<script src="vendor/three-bundle.min.js"></script>
<script src="vendor/meshopt_decoder.js"></script>
<script>
    'use strict';
    (function () {
        // 모바일 미리보기 프레임이 이 페이지를 대체하는 중이면(최상위 ?mobile=true)
        // 백그라운드에서 3D 렌더러를 띄우지 않는다. 실제 페이지는 프레임 안(framed=1)에서 동작.
        if (window.__ARES_MOBILE_FRAME__) return;
        const THREE = window.THREE;
        const { GLTFLoader, OrbitControls, RoomEnvironment } = window.ARES3;

        const stage = document.getElementById('robot-stage');
        const loadingEl = document.getElementById('robot-loading');
        const greetEl = document.getElementById('robot-greet');

        // ---- 손 흔들기 파라미터 (튜닝 가능) ----
        // armEuler: 오른팔(RightArm)을 들어올리는 회전(라디안, rest에 곱함)
        // fore*   : 팔뚝(RightForeArm)을 좌우로 흔드는 진동
        const WAVE = {
            introDur: 1.05,            // 등장 애니메이션 시간(초)
            armBase: [-1.0, 0, 0],     // 오른팔 들어올리는 기본 자세(rest에 곱함)
            swingComp: 1,              // 좌우로 흔드는 오일러 성분 (0=x, 1=y, 2=z)
            swing: 0.5,                // 흔드는 폭(라디안)
            speed: 5.0,                // 흔드는 속도
            foreSwing: 0.3,            // 팔뚝(RightForeArm) 보조 흔들기 폭
        };
        // 카메라 프레이밍(모델 높이 배수) — 머리·안테나 위 여백 확보를 위해 충분히 멀리
        const CAM = { y: 0.5, z: 7.5, lookY: 0.5 };

        function size() {
            return { w: stage.clientWidth, h: stage.clientHeight };
        }

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        const { w, h } = size();
        renderer.setSize(w, h);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.1;
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        stage.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        const pmrem = new THREE.PMREMGenerator(renderer);
        scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

        const camera = new THREE.PerspectiveCamera(40, w / h, 0.1, 100);
        function applyCam() {
            camera.position.set(0, modelH * CAM.y, modelH * CAM.z);
            camera.lookAt(0, modelH * CAM.lookY, 0);
        }

        // 마우스 조작: 좌우 회전은 자유, 위·아래 기울기는 ±10°로 제한. 줌/이동은 비활성.
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.enablePan = false;
        controls.enableZoom = false;
        controls.rotateSpeed = 0.6;
        const TILT = THREE.MathUtils.degToRad(10);
        controls.minPolarAngle = Math.PI / 2 - TILT;   // 위로 10°
        controls.maxPolarAngle = Math.PI / 2 + TILT;   // 아래로 10°

        // ---- 조명 ----
        scene.add(new THREE.HemisphereLight(0xffffff, 0xdfe4ec, 0.7));
        const key = new THREE.DirectionalLight(0xfff4e6, 2.2);
        key.position.set(3, 6, 5);
        key.castShadow = true;
        key.shadow.mapSize.set(1024, 1024);
        key.shadow.bias = -0.0003;
        scene.add(key);
        const fill = new THREE.DirectionalLight(0xbcd2f0, 0.6);
        fill.position.set(-4, 2, 3);
        scene.add(fill);

        // ---- 바닥 그림자 ----
        const ground = new THREE.Mesh(
            new THREE.CircleGeometry(4, 48),
            new THREE.ShadowMaterial({ opacity: 0.14 })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // ---- 모델 ----
        const group = new THREE.Group();       // 등장 애니메이션용 래퍼
        scene.add(group);

        let mixer = null;
        const clock = new THREE.Clock();
        const bones = { rightArm: null, rightForeArm: null };
        const rest = { arm: new THREE.Quaternion(), fore: new THREE.Quaternion() };
        let modelH = 1.6;
        let ready = false;

        const loader = new GLTFLoader();
        // ares_robot.glb 는 meshopt + WebP 압축본이므로 디코더 필수
        // (2026-06-25 최적화: 7.2MB→0.56MB, EXT_meshopt_compression + EXT_texture_webp + KHR_mesh_quantization)
        if (window.MeshoptDecoder) loader.setMeshoptDecoder(window.MeshoptDecoder);
        function onModelLoad(gltf) {
            const root = gltf.scene;
            root.traverse((o) => {
                if (o.isMesh) { o.castShadow = true; o.receiveShadow = true; o.frustumCulled = false; }
            });

            // 중앙·바닥 정렬
            const box = new THREE.Box3().setFromObject(root);
            const sz = box.getSize(new THREE.Vector3());
            const c = box.getCenter(new THREE.Vector3());
            root.position.x -= c.x;
            root.position.z -= c.z;
            root.position.y -= box.min.y;
            modelH = sz.y;
            group.add(root);

            // 카메라 — 윗부분 여백을 둬서 흔드는 손이 잘림 없이 보이도록
            applyCam();
            controls.target.set(0, modelH * CAM.lookY, 0);
            controls.update();

            // Idle 재생 (몸통의 자연스러운 미세 동작)
            if (gltf.animations.length) {
                mixer = new THREE.AnimationMixer(root);
                mixer.clipAction(gltf.animations[0]).play();
            }

            // 팔 본 확보 + rest 자세 저장
            bones.rightArm = root.getObjectByName('RightArm');
            bones.rightForeArm = root.getObjectByName('RightForeArm');
            if (bones.rightArm) rest.arm.copy(bones.rightArm.quaternion);
            if (bones.rightForeArm) rest.fore.copy(bones.rightForeArm.quaternion);

            ready = true;
            clock.start();
            loadingEl.classList.add('hidden');
        }
        function onModelErr(err) {
            console.error('로봇 모델 로드 실패:', err);
            loadingEl.textContent = '로봇을 불러오지 못했어요';
        }
        // base64 → ArrayBuffer (file://에서 fetch 없이 parse 하기 위함)
        function b64ToBuffer(b64) {
            const bin = atob(b64), u8 = new Uint8Array(bin.length);
            for (let i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
            return u8.buffer;
        }
        // 임베드 스크립트(클래식)를 동적 로드 — file://에서도 허용됨
        function ensureEmbed() {
            return new Promise((res, rej) => {
                if (window.ARES_ROBOT_GLB_B64) return res(window.ARES_ROBOT_GLB_B64);
                const s = document.createElement('script');
                s.src = 'Mesh/ares_robot.embed.js';
                s.onload = () => window.ARES_ROBOT_GLB_B64
                    ? res(window.ARES_ROBOT_GLB_B64) : rej(new Error('임베드 데이터 없음'));
                s.onerror = () => rej(new Error('Mesh/ares_robot.embed.js 로드 실패'));
                document.head.appendChild(s);
            });
        }
        // file://(서버 없음): 임베드 GLB를 parse() → 인터넷·서버 불필요
        // http(s): Mesh/ 에서 직접 fetch (가벼움)
        if (location.protocol === 'file:') {
            ensureEmbed()
                .then((b64) => loader.parse(b64ToBuffer(b64), '', onModelLoad, onModelErr))
                .catch(onModelErr);
        } else {
            loader.load('Mesh/ares_robot.glb', onModelLoad, undefined, onModelErr);
        }

        // 등장 애니메이션 (easeOutBack 팝인)
        function easeOutBack(x) {
            const c1 = 1.70158, c3 = c1 + 1;
            return 1 + c3 * Math.pow(x - 1, 3) + c1 * Math.pow(x - 1, 2);
        }

        const _e = new THREE.Euler();
        const _e2 = new THREE.Euler();
        const _qd = new THREE.Quaternion();
        const _target = new THREE.Quaternion();
        let greeted = false;

        function tick() {
            requestAnimationFrame(tick);
            if (!ready) { renderer.render(scene, camera); return; }

            const dt = clock.getDelta();
            const t = clock.elapsedTime;
            if (mixer) mixer.update(dt);

            // 등장 진행도
            const introP = Math.min(t / WAVE.introDur, 1);
            const pop = easeOutBack(introP);
            group.scale.setScalar(pop);
            group.position.y = (1 - introP) * -0.25 * modelH;

            // 손 흔들기 게이트(등장 후 시작, 부드럽게 램프업)
            const g = Math.max(0, Math.min((t - WAVE.introDur) / 0.5, 1));

            // 오른팔: 들어올린 자세에서 좌우로 흔들기 (rest → 목표 자세로 slerp)
            const sw = Math.sin(t * WAVE.speed) * WAVE.swing;
            if (bones.rightArm) {
                _e.set(
                    WAVE.armBase[0] + (WAVE.swingComp === 0 ? sw : 0),
                    WAVE.armBase[1] + (WAVE.swingComp === 1 ? sw : 0),
                    WAVE.armBase[2] + (WAVE.swingComp === 2 ? sw : 0)
                );
                _qd.setFromEuler(_e);
                _target.copy(rest.arm).multiply(_qd);
                bones.rightArm.quaternion.slerpQuaternions(rest.arm, _target, g);
            }
            // 팔뚝: 보조 흔들기로 손목 느낌 추가
            if (bones.rightForeArm) {
                _e2.set(0, 0, sw * (WAVE.foreSwing / (WAVE.swing || 1)) * g);
                _qd.setFromEuler(_e2);
                bones.rightForeArm.quaternion.copy(rest.fore).multiply(_qd);
            }

            // 인사말 표시(흔들기 시작 시점)
            if (!greeted && g > 0.2) { greeted = true; greetEl.classList.add('show'); }

            controls.update();
            renderer.render(scene, camera);
        }
        tick();

        addEventListener('resize', () => {
            const { w, h } = size();
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        });
    })();
</script>
</body>
</html>
