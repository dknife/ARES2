<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ARES 알비 로봇 — 눈 LED 제어</title>
<style>
  :root {
    --bg0:#0a0e1a; --bg1:#131a2e; --panel:rgba(18,24,42,0.82);
    --border:rgba(120,150,210,0.22); --copper:#d98a4a; --sky:#5fa8e6;
    --green:#22ff7a; --text:#e7ecf5; --muted:#9aa6bf;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { height:100%; overflow:hidden; }
  body {
    font-family:"Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    color:var(--text);
    background:radial-gradient(circle at 70% 15%, #1c2a22 0%, var(--bg1) 42%, var(--bg0) 100%);
  }
  #canvas-wrap { position:fixed; inset:0; }
  canvas { display:block; cursor:grab; }
  canvas:active { cursor:grabbing; }

  header {
    position:fixed; top:0; left:0; right:0; padding:14px 20px;
    display:flex; align-items:baseline; gap:12px;
    background:linear-gradient(180deg, rgba(8,11,20,0.75), transparent);
    pointer-events:none; z-index:10;
  }
  header h1 { font-size:17px; font-weight:700; letter-spacing:-0.3px; }
  header h1 .accent { color:var(--green); }
  header .sub { font-size:12px; color:var(--muted); }

  .panel {
    position:fixed; z-index:10; background:var(--panel); backdrop-filter:blur(10px);
    border:1px solid var(--border); border-radius:12px; padding:14px;
  }
  .panel h2 {
    font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1px;
    color:var(--muted); margin-bottom:10px;
  }

  /* LED 제어 패널 */
  #controls { left:16px; bottom:16px; width:240px; }
  .led-grid { display:grid; grid-template-columns:1fr 1fr; gap:9px; }
  .led-btn {
    font:inherit; font-size:14px; font-weight:600; color:var(--text);
    background:rgba(95,168,230,0.10); border:1px solid var(--border);
    border-radius:10px; padding:12px 6px; cursor:pointer; transition:all 0.15s;
    text-align:center; line-height:1.3;
  }
  .led-btn small { display:block; font-size:10px; opacity:0.7; font-weight:400; margin-top:2px; }
  .led-btn .dot {
    display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:5px;
    background:#2a3550; vertical-align:middle; transition:all 0.15s;
  }
  .led-btn:hover { border-color:var(--sky); }
  .led-btn.on {
    background:rgba(34,255,122,0.16); border-color:var(--green); color:#dfffe9;
  }
  .led-btn.on .dot { background:var(--green); box-shadow:0 0 8px 2px rgba(34,255,122,0.8); }

  .toggles { margin-top:12px; display:flex; flex-direction:column; gap:8px; }
  .toggle { display:flex; align-items:center; justify-content:space-between; font-size:13px; cursor:pointer; user-select:none; }
  .toggle input { display:none; }
  .switch { width:38px; height:21px; border-radius:11px; background:rgba(120,140,180,0.25); position:relative; transition:0.18s; border:1px solid var(--border); }
  .switch::after { content:""; position:absolute; top:2px; left:2px; width:15px; height:15px; border-radius:50%; background:#cfd8ea; transition:0.18s; }
  .toggle input:checked + .switch { background:var(--green); }
  .toggle input:checked + .switch::after { left:19px; background:#06140c; }
  #reset-btn { margin-top:12px; width:100%; font:inherit; font-size:12px; color:var(--muted); background:transparent; border:1px solid var(--border); border-radius:8px; padding:8px; cursor:pointer; transition:0.15s; }
  #reset-btn:hover { color:var(--text); border-color:var(--sky); }

  #info { right:16px; top:56px; width:200px; }
  .stat { display:flex; justify-content:space-between; font-size:13px; padding:4px 0; }
  .stat .k { color:var(--muted); } .stat .v { font-variant-numeric:tabular-nums; font-weight:600; }

  #hint { right:16px; bottom:16px; font-size:11px; color:var(--muted); background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:8px 11px; z-index:10; }

  #overlay { position:fixed; inset:0; z-index:20; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; background:rgba(8,11,20,0.78); backdrop-filter:blur(4px); transition:opacity 0.3s; text-align:center; padding:24px; }
  #overlay.hidden { opacity:0; pointer-events:none; }
  .spinner { width:46px; height:46px; border-radius:50%; border:3px solid rgba(120,150,210,0.2); border-top-color:var(--green); animation:spin 0.9s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  #overlay .msg { font-size:14px; } #overlay .pct { font-size:13px; color:var(--green); }
  #overlay.error .spinner { display:none; }
  #overlay .err-detail { font-size:12px; color:var(--muted); max-width:460px; line-height:1.6; background:rgba(0,0,0,0.3); border:1px solid var(--border); border-radius:8px; padding:12px 14px; text-align:left; }
  code { font-family:"D2Coding",Menlo,monospace; color:var(--sky); }
</style>
<script src="vendor/three-bundle.min.js"></script>
<script src="../vendor/inline_assets.js"></script>
</head>
<body>
  <div id="canvas-wrap"></div>

  <header>
    <h1>ARES <span class="accent">알비</span> 로봇 — 눈 LED 제어</h1>
    <span class="sub">AlbiStaticLow.glb · WebGL · three.js</span>
  </header>

  <div id="controls" class="panel">
    <h2>눈 LED</h2>
    <div class="led-grid">
      <button class="led-btn" data-side="L"><span class="dot"></span>LED 1<small>왼쪽 눈</small></button>
      <button class="led-btn" data-side="R"><span class="dot"></span>LED 2<small>오른쪽 눈</small></button>
    </div>
    <div class="toggles">
      <label class="toggle">자동 회전<input type="checkbox" id="t-rotate"><span class="switch"></span></label>
      <label class="toggle">바닥 격자<input type="checkbox" id="t-grid" checked><span class="switch"></span></label>
    </div>
    <button id="reset-btn">시점 초기화</button>
  </div>

  <div id="info" class="panel">
    <h2>메시 정보</h2>
    <div class="stat"><span class="k">모델</span><span class="v">알비 (Static)</span></div>
    <div class="stat"><span class="k">정점</span><span class="v" id="i-verts">—</span></div>
    <div class="stat"><span class="k">삼각형</span><span class="v" id="i-tris">—</span></div>
  </div>

  <div id="hint">마우스: 회전(좌클릭) · 확대(휠) · 이동(우클릭)</div>

  <div id="overlay">
    <div class="spinner"></div>
    <div class="msg" id="ov-msg">알비를 불러오는 중…</div>
    <div class="pct" id="ov-pct"></div>
    <div class="err-detail" id="ov-err" style="display:none"></div>
  </div>

<script>
'use strict';
(function () {
  const THREE = window.THREE;
  const { GLTFLoader, OrbitControls, RoomEnvironment } = window.ARES3;

  // ===== 눈 LED 위치(모델 로컬 좌표) — 화면 보며 튜닝 =====
  const EYE = {
    radius: 0.11,
    left:  [-0.145, 0.425, 0.12],   // LED 1 (로봇의 왼쪽 눈) — 뒤로 지름만큼, 위로 반지름만큼
    right: [ 0.145, 0.425, 0.12],   // LED 2 (로봇의 오른쪽 눈)
  };
  const GLB_URL = 'Resources/AlbiStaticLow.glb';

  const wrap = document.getElementById('canvas-wrap');
  const $ = (id) => document.getElementById(id);
  const overlay = $('overlay');

  const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.05;
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  wrap.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  const pmrem = new THREE.PMREMGenerator(renderer);
  scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

  const camera = new THREE.PerspectiveCamera(42, innerWidth/innerHeight, 0.01, 100);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.autoRotate = false;
  controls.autoRotateSpeed = 1.0;

  // 조명
  scene.add(new THREE.HemisphereLight(0xdfeaff, 0x32402f, 0.55));
  const key = new THREE.DirectionalLight(0xfff4e6, 2.0);
  key.position.set(3, 6, 5); key.castShadow = true;
  key.shadow.mapSize.set(2048,2048); key.shadow.bias = -0.0003;
  scene.add(key);
  const fill = new THREE.DirectionalLight(0x9fc0f0, 0.5);
  fill.position.set(-4, 2, 4); scene.add(fill);

  // 바닥 + 격자
  const ground = new THREE.Mesh(new THREE.CircleGeometry(5,48), new THREE.ShadowMaterial({opacity:0.28}));
  ground.rotation.x = -Math.PI/2; ground.receiveShadow = true; scene.add(ground);
  const grid = new THREE.GridHelper(10, 20, 0x33ff7a, 0x2a3550);
  grid.material.opacity = 0.3; grid.material.transparent = true; scene.add(grid);

  // 발광 구용 라디얼 글로우 텍스처
  function makeGlowTexture() {
    const c = document.createElement('canvas'); c.width = c.height = 128;
    const x = c.getContext('2d');
    const g = x.createRadialGradient(64,64,0, 64,64,64);
    g.addColorStop(0.0, 'rgba(180,255,210,1)');
    g.addColorStop(0.25,'rgba(40,255,120,0.65)');
    g.addColorStop(1.0, 'rgba(0,255,90,0)');
    x.fillStyle = g; x.fillRect(0,0,128,128);
    const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace; return t;
  }
  const glowTex = makeGlowTexture();

  // 눈 하나 만들기: 투명한 구 + 글로우 스프라이트 + 점광원
  function makeEye(localPos) {
    const grp = new THREE.Group();
    grp.position.fromArray(localPos);
    const sphere = new THREE.Mesh(
      new THREE.SphereGeometry(EYE.radius, 28, 28),
      new THREE.MeshStandardMaterial({
        color:0x0c2a18, emissive:0x00ff66, emissiveIntensity:0,
        transparent:true, opacity:0.4, roughness:0.2, metalness:0,
      })
    );
    const glow = new THREE.Sprite(new THREE.SpriteMaterial({
      map:glowTex, color:0x55ff99, transparent:true,
      blending:THREE.AdditiveBlending, depthWrite:false, opacity:0.95,
    }));
    glow.scale.setScalar(EYE.radius*3.3); glow.visible = false;
    const light = new THREE.PointLight(0x33ff77, 0, EYE.radius*22, 2);
    grp.add(sphere, glow, light);
    return { group:grp, sphere, glow, light, on:false };
  }
  const eyeL = makeEye(EYE.left);
  const eyeR = makeEye(EYE.right);

  function setEye(side, on) {
    const e = (side === 'L') ? eyeL : eyeR;
    e.on = on;
    e.sphere.material.emissiveIntensity = on ? 3.2 : 0.0;
    e.sphere.material.opacity = on ? 0.92 : 0.4;
    e.glow.visible = on;
    e.light.intensity = on ? 1.8 : 0.0;
    const btn = document.querySelector(`.led-btn[data-side="${side}"]`);
    if (btn) btn.classList.toggle('on', on);
  }

  // ===== 모델 로드 =====
  let modelH = 1.9;
  const loader = new GLTFLoader();
  loader.load(GLB_URL, (gltf) => {
    const root = gltf.scene;
    root.traverse((o) => { if (o.isMesh){ o.castShadow=true; o.receiveShadow=true; o.frustumCulled=false; } });

    // 중앙·바닥 정렬
    const box = new THREE.Box3().setFromObject(root);
    const sz = box.getSize(new THREE.Vector3());
    const c = box.getCenter(new THREE.Vector3());
    root.position.x -= c.x; root.position.z -= c.z; root.position.y -= box.min.y;
    modelH = sz.y;

    // 눈(발광 구)을 모델에 부착 → 모델과 함께 움직임
    root.add(eyeL.group, eyeR.group);

    scene.add(root);
    frameModel(sz);
    updateInfo(gltf);
    hideOverlay();
  }, (e) => {
    if (e.lengthComputable) $('ov-pct').textContent = Math.round(e.loaded/e.total*100)+'%';
    else $('ov-pct').textContent = (e.loaded/1e6).toFixed(1)+' MB';
  }, (err) => {
    console.error(err);
    overlay.className = 'error'; $('ov-msg').textContent = '모델을 불러오지 못했습니다';
    $('ov-pct').textContent = '';
    const el = $('ov-err'); el.style.display='block';
    el.innerHTML = `경로: <code>${GLB_URL}</code><br><br>이 페이지는 <b>HTTP 서버</b>에서 실행해야 합니다(file://에서는 GLB fetch가 막힘):<br><code>cd WebGL &amp;&amp; python3 -m http.server 8000</code><br>→ <code>http://localhost:8000/</code><br><br>오류: ${err.message||err}`;
  });

  const view = { dist:4, cy:1 };
  function frameModel(sz) {
    const maxDim = Math.max(sz.x, sz.y, sz.z);
    const fov = camera.fov * Math.PI/180;
    view.dist = (maxDim/2)/Math.tan(fov/2) * 1.8;
    view.cy = modelH * 0.55;
    camera.near = view.dist/100; camera.far = view.dist*100;
    camera.updateProjectionMatrix();
    applyView();
  }
  function applyView() {
    // 정면(+Z)에서 약간 위쪽
    camera.position.set(0, view.cy, view.dist);
    controls.target.set(0, view.cy, 0);
    controls.update();
  }

  function updateInfo(gltf) {
    let v=0, t=0;
    gltf.scene.traverse((o)=>{ if(o.isMesh && o.geometry){ const p=o.geometry.attributes.position; if(p)v+=p.count; const idx=o.geometry.index; t += idx? idx.count/3 : (p?p.count/3:0); } });
    $('i-verts').textContent = v.toLocaleString();
    $('i-tris').textContent = Math.round(t).toLocaleString();
  }

  function hideOverlay(){ overlay.classList.add('hidden'); }

  // UI
  document.querySelectorAll('.led-btn').forEach((btn) => {
    btn.addEventListener('click', () => {
      const side = btn.dataset.side;
      const e = (side==='L')?eyeL:eyeR;
      setEye(side, !e.on);
    });
  });
  $('t-rotate').addEventListener('change', (e)=>{ controls.autoRotate = e.target.checked; });
  $('t-grid').addEventListener('change', (e)=>{ grid.visible = e.target.checked; });
  $('reset-btn').addEventListener('click', applyView);
  addEventListener('resize', ()=>{ camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); });

  (function tick(){ requestAnimationFrame(tick); controls.update(); renderer.render(scene, camera); })();
})();
</script>
</body>
</html>
